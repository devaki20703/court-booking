server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    discovery:
      enabled: true
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**,/users/**
          filters:
            - StripPrefix=0
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/courts/**,/bookings/**
          filters:
            - StripPrefix=0
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**,/api/payments/**
          filters:
            - StripPrefix=0
      discoveryLocator:
        enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: courtBookingSecretKey2024VeryLongSecretKeyForJWTTokenGeneration

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
