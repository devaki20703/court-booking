server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    discovery:
      enabled: true
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      httpclient:
        response-timeout: 30s
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**,/users/**
          filters:
            - StripPrefix=0
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/courts/**,/bookings/**,/bookings
          filters:
            - StripPrefix=0
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**,/payments/**
      discoveryLocator:
        enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    health-check-url-path: /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:YOUR_SECRET_KEY_HERE}
    expiration: 86400000
  performance:
    threshold: 500

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
    com.courtbooking.apigateway: DEBUG
